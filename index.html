<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel Charlet</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'ATP';
      src: url('assets/ATP-Pleasurize.otf') format('opentype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #ffffff;
      overflow-x: hidden;
    }

    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      background-image: radial-gradient(circle, #35C9FF 1px, transparent 1px);
      background-size: 28px 28px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 15% 40%, rgba(53,201,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 500px 350px at 85% 50%, rgba(53,201,255,0.14) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
      max-width: 1400px;
      padding: 4rem 2rem;
      gap: 2rem;
    }

    .card-wrap { display: flex; align-items: center; }
    .card-wrap.left { justify-content: flex-end; }
    .card-wrap.right { justify-content: flex-start; }

    .sorare-card {
      width: 220px;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
    }

    .sorare-card.left { transform: rotate(-8deg) translateY(-20px); }
    .sorare-card.right { transform: rotate(6deg) translateY(10px); }
    .sorare-card img { width: 100%; border-radius: 16px; }

    .hero-center {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .hey {
      font-family: 'ATP', cursive;
      font-size: 2.2rem;
      color: #222;
    }

    .big-name {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(5rem, 9vw, 8rem);
      font-weight: 900;
      color: #0a0a0a;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }

    .subtitle {
      font-size: 15px;
      color: #555;
      line-height: 1.7;
      max-width: 380px;
    }

    .badges { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .badges-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    .annotation {
      font-family: 'ATP', cursive;
      font-size: 1.4rem;
      color: #333;
      position: absolute;
      bottom: 2.5rem;
      left: 2.5rem;
      transform: rotate(-5deg);
      z-index: 2;
    }
  </style>
</head>
<body>

<section id="hero">
  <div class="hero-inner">

    <div class="card-wrap left">
      <div class="sorare-card left">
        <img src="assets/SorareSamCard.png" alt="Carte Sorare Samuel Charlet">
      </div>
    </div>

    <div class="hero-center">
      <div>
        <div class="hey">Hey I'm</div>
        <div class="big-name">Samuel</div>
      </div>

      <p class="subtitle">
        Let's talk together to see if I can help you in your project.<br>
        No mail, no long time process, just text me.
      </p>

      <a href="https://wa.me/33786100987" class="primary-button">
        <img src="assets/icons/WhatsAppIcon.svg" alt="WhatsApp">
        Talk with me
      </a>

      <div class="badges">
        <div class="badges-row">
          <a class="tab-button">
            <img src="assets/icons/Check_ring_light.svg" alt="">
            Friendly
          </a>
          <a class="tab-button">
            <img src="assets/icons/Check_ring_light.svg" alt="">
            Listen
          </a>
          <a class="tab-button">
            <img src="assets/icons/Check_ring_light.svg" alt="">
            Solution Minded
          </a>
          <a class="tab-button">
            <img src="assets/icons/Check_ring_light.svg" alt="">
            Efficient
          </a>
        </div>
        <div class="badges-row">
          <a class="tab-button-red">
            <img src="assets/icons/Broken_heart_light.svg" alt="">
            LinkedIn S****
          </a>
          <a class="tab-button-red">
            <img src="assets/icons/Broken_heart_light.svg" alt="">
            Copy others
          </a>
          <a class="tab-button-red">
            <img src="assets/icons/Broken_heart_light.svg" alt="">
            Liar pleasing
          </a>
          <a class="tab-button-red">
            <img src="assets/icons/Broken_heart_light.svg" alt="">
            Lazy (maybe)
          </a>
        </div>
      </div>
    </div>

    <div class="card-wrap right">
      <div class="sorare-card right">
        <img src="assets/SorareSamCard.png" alt="Carte Sorare Samuel Charlet">
      </div>
    </div>

  </div>

  <div class="annotation">*i love football</div>
</section>

</body>
</html>
