<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel Charlet</title>
  <style>
    @font-face {
      font-family: 'ATP';
      src: url('assets/ATP-Pleasurize.otf') format('opentype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      overflow-x: hidden;
    }

    /* DOTS + LUEURS */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      background-image: radial-gradient(circle, #35C9FF 1px, transparent 1px);
      background-size: 28px 28px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 15% 40%, rgba(53,201,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 500px 350px at 85% 50%, rgba(53,201,255,0.14) 0%, transparent 70%);
      pointer-events: none;
    }

    /* LAYOUT */
    .hero-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
      max-width: 1400px;
      padding: 4rem 2rem;
      gap: 2rem;
    }

    /* CARTES */
    .card-wrap { display: flex; align-items: center; }
    .card-wrap.left { justify-content: flex-end; }
    .card-wrap.right { justify-content: flex-start; }

    .sorare-card {
      width: 220px;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
    }

    .sorare-card.left { transform: rotate(-8deg) translateY(-20px); }
    .sorare-card.right { transform: rotate(6deg) translateY(10px); }

    .sorare-card img { width: 100%; border-radius: 16px; }

    /* CENTRE */
    .hero-center {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .hey {
      font-family: 'ATP', cursive;
      font-size: 2.2rem;
      color: #222;
    }

    .big-name {
      font-family: 'Inter', sans-serif;
      font-size: clamp(5rem, 9vw, 8rem);
      font-weight: 900;
      color: #0a0a0a;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }

    .subtitle {
      font-size: 15px;
      color: #555;
      line-height: 1.7;
      max-width: 380px;
    }

    /* BOUTON WHATSAPP */
    .btn-talk {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #1a6ed4;
      color: #fff;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem 2rem;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-talk:hover { opacity: 0.88; }

    .wa-circle {
      width: 22px; height: 22px;
      background: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* BADGES */
    .badges { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .badges-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0.45rem 1.1rem;
      border-radius: 2rem;
      font-size: 13px;
      font-weight: 500;
    }

    .badge-green { background: #0d2e1f; color: #4ade80; }
    .badge-dark  { background: #1c0a0a; color: #f87171; }

    /* ANNOTATION */
    .annotation {
      font-family: 'ATP', cursive;
      font-size: 1.4rem;
      color: #333;
      position: absolute;
      bottom: 2.5rem;
      left: 2.5rem;
      transform: rotate(-5deg);
      z-index: 2;
    }
  </style>
</head>
<body>

<section id="hero">
  <div class="hero-inner">

    <div class="card-wrap left">
      <div class="sorare-card left">
        <img src="assets/SorareSamCard.png" alt="Carte Sorare Samuel Charlet">

    </div>

      <p class="subtitle">
        Let's talk together to see if I can help you in your project.<br>
        No mail, no long time process, just text me.
      </p>

      <a href="https://wa.me/+33786100987" class="btn-talk">

            <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.528 5.845L0 24l6.335-1.652A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.373l-.36-.213-3.728.973.997-3.634-.234-.374A9.818 9.818 0 1112 21.818z"/>
          </svg>
        </div>
        Talk with me
      </a>

      <div class="badges">
        <div class="badges-row">
          <span class="badge badge-green">✓ Friendly</span>
          <span class="badge badge-green">✓ Listen</span>
          <span class="badge badge-green">✓ Solution Minded</span>
          <span class="badge badge-green">✓ Efficient</span>
        </div>
        <div class="badges-row">
          <span class="badge badge-dark">♡ LinkedIn S****</span>
          <span class="badge badge-dark">♡ Copy others</span>
          <span class="badge badge-dark">♡ Liar pleasing</span>
          <span class="badge badge-dark">♡ Lazy (maybe)</span>
        </div>
      </div>
    </div>

    <div class="card-wrap right">
      <div class="sorare-card right">
        <img src="assets/SorareSamCard.png" alt="Carte Sorare Samuel Charlet">
      </div>
    </div>

  </div>

  <div class="annotation">*i love football</div>
</section>

</body>
</html>
